<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FindErrorCode — SW 개발자, 학생을 위한 코드 취약점 분석 사이트FEC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D1117;
    --bg-card: #161B22;
    --bg-input: #0D1117;
    --border: #30363D;
    --border-focus: #58A6FF;
    --text: #E6EDF3;
    --text-muted: #8B949E;
    --blue: #58A6FF;
    --green: #3FB950;
    --red: #F85149;
    --yellow: #D29922;
    --purple: #BC8CFF;
    --orange: #F0883E;
    --radius: 8px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 56px;
    gap: 24px;
  }
  .nav-logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--blue);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .nav-logo span { color: var(--green); }
  .nav-tabs { display: flex; gap: 4px; flex: 1; }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .nav-tab.active { background: rgba(88,166,255,0.12); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .nav-admin-btn {
    margin-left: auto;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .nav-admin-btn:hover { border-color: var(--red); color: var(--red); }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before { content: '>'; color: var(--green); font-weight: 700; }
  .count-badge {
    background: rgba(48,54,61,0.8);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-primary {
    background: var(--blue);
    color: #0D1117;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: rgba(248,81,73,0.1); border-color: var(--red); }

  .post-list { display: flex; flex-direction: column; gap: 12px; }
  .post-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .post-card:hover { border-color: #58A6FF44; }
  .post-card-header {
    padding: 14px 16px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .post-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid;
  }
  .tag-vuln { background: rgba(248,81,73,0.1); color: #F85149; border-color: rgba(248,81,73,0.3); }
  .tag-quiz { background: rgba(188,140,255,0.1); color: #BC8CFF; border-color: rgba(188,140,255,0.3); }
  .post-author { font-size: 13px; color: var(--text-muted); }
  .post-author strong { color: var(--blue); }
  .post-time { font-size: 12px; color: var(--text-muted); }
  .post-title {
    padding: 8px 16px 0;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
  }
  .post-title:hover { color: var(--blue); }
  .post-description { padding: 6px 16px; font-size: 14px; color: var(--text-muted); }

  .post-code-preview {
    margin: 10px 16px;
    background: #0D1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .code-bar {
    background: #161B22;
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .code-bar-title { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); flex: 1; }
  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--orange);
    background: rgba(240,136,62,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid rgba(240,136,62,0.2);
  }
  .code-preview-body {
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #8B949E;
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 120px;
    overflow-y: hidden;
    position: relative;
  }
  .code-preview-body.expanded { max-height: none; }
  .code-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, #0D1117);
    pointer-events: none;
  }
  .post-footer {
    padding: 10px 16px 14px;
    display: flex;
    align-items: center;
  }

  .comments-section { border-top: 1px solid var(--border); display: none; }
  .comments-section.open { display: block; }
  .comment-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .comment-item {
    background: rgba(13,17,23,0.5);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .comment-author { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--blue); font-weight: 600; }
  .comment-time { font-size: 11px; color: var(--text-muted); }
  .comment-delete-btn {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .comment-delete-btn:hover { color: var(--red); }
  .comment-content { font-size: 14px; color: var(--text); white-space: pre-wrap; }

  .severity-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid;
  }
  .sev-critical { background: rgba(248,81,73,0.15); color: #F85149; border-color: rgba(248,81,73,0.4); }
  .sev-high     { background: rgba(240,136,62,0.15); color: #F0883E; border-color: rgba(240,136,62,0.4); }
  .sev-medium   { background: rgba(210,153,34,0.15); color: #D29922; border-color: rgba(210,153,34,0.4); }
  .sev-low      { background: rgba(63,185,80,0.15);  color: #3FB950; border-color: rgba(63,185,80,0.4); }
  .sev-info     { background: rgba(88,166,255,0.15); color: #58A6FF; border-color: rgba(88,166,255,0.4); }

  .comment-form {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .comment-form-row { display: flex; gap: 8px; }
  .input-field {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
    width: 100%;
  }
  .input-field:focus { outline: none; border-color: var(--border-focus); }
  .input-field::placeholder { color: var(--text-muted); }
  select.input-field { cursor: pointer; }
  textarea.input-field { resize: vertical; min-height: 80px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .btn-submit-comment {
    background: rgba(88,166,255,0.12);
    color: var(--blue);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-submit-comment:hover { background: rgba(88,166,255,0.2); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .modal-title::before { content: '>_'; color: var(--green); font-size: 14px; }
  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .form-label .required { color: var(--red); margin-left: 3px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .admin-modal { max-width: 400px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state h3 { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 14px;
    color: var(--text);
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 300px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }

  .admin-indicator {
    display: none;
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    align-items: center;
    gap: 6px;
  }
  .admin-indicator.visible { display: flex; }
  .admin-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .hero {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 300px; height: 100%;
    background: radial-gradient(ellipse at right center, rgba(88,166,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--green); margin-bottom: 8px; }
  .hero-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .hero-title span { color: var(--blue); }
  .hero-sub { font-size: 14px; color: var(--text-muted); }

  .page { display: none; }
  .page.active { display: block; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">&gt;_ <span>VulnHub</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('vuln', this)">취약점 분석</button>
    <button class="nav-tab" onclick="switchPage('quiz', this)">코드 퀴즈</button>
  </div>
  <div class="admin-indicator" id="adminIndicator">
    <span class="admin-dot"></span>관리자 모드
  </div>
  <button class="nav-admin-btn" onclick="openAdminModal()">🔑 관리자</button>
</nav>

<!-- VULN PAGE -->
<div class="page active" id="page-vuln">
  <div class="container">
    <div class="hero">
      <div class="hero-eyebrow">// VULNERABILITY ANALYSIS COMMUNITY</div>
      <h1 class="hero-title">코드 <span>취약점</span>을 함께 분석합니다</h1>
      <p class="hero-sub">코드를 올리면 여러 유저들이 보안 취약점을 함께 찾아드립니다. 닉네임과 코드만 있으면 됩니다.</p>
    </div>
    <div class="section-header">
      <div class="section-title">분석 게시글 <span class="count-badge" id="vulnCount">0</span></div>
      <button class="btn-primary" onclick="openPostModal('vuln')">+ 게시글 올리기</button>
    </div>
    <div class="post-list" id="vulnList"></div>
  </div>
</div>

<!-- QUIZ PAGE -->
<div class="page" id="page-quiz">
  <div class="container">
    <div class="hero">
      <div class="hero-eyebrow">// CODE VULNERABILITY QUIZ</div>
      <h1 class="hero-title">버그를 <span>찾을 수 있나요?</span></h1>
      <p class="hero-sub">일부러 숨겨놓은 취약점 코드 퀴즈입니다. 댓글로 정답을 맞춰보세요!</p>
    </div>
    <div class="section-header">
      <div class="section-title">퀴즈 게시글 <span class="count-badge" id="quizCount">0</span></div>
      <button class="btn-primary" onclick="openPostModal('quiz')">+ 퀴즈 올리기</button>
    </div>
    <div class="post-list" id="quizList"></div>
  </div>
</div>

<!-- POST MODAL -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="postModalTitle">게시글 올리기</div>
      <button class="modal-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">닉네임<span class="required">*</span></label>
        <input class="input-field" id="inputAuthor" placeholder="사용할 닉네임을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">게시글 제목<span class="required">*</span></label>
        <input class="input-field" id="inputTitle" placeholder="ex) 비밀번호 키 코드">
      </div>
      <div class="form-group">
        <label class="form-label">코드 언어</label>
        <select class="input-field" id="inputLang">
          <option>Python</option>
          <option>JavaScript</option>
          <option>TypeScript</option>
          <option>Java</option>
          <option>C</option>
          <option>C++</option>
          <option>C#</option>
          <option>Go</option>
          <option>Rust</option>
          <option>PHP</option>
          <option>Ruby</option>
          <option>Solidity</option>
          <option>기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">코드<span class="required">*</span></label>
        <textarea class="input-field" id="inputCode" placeholder="분석을 원하는 코드를 붙여넣으세요..." style="min-height:180px;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">설명 (선택)</label>
        <input class="input-field" id="inputDesc" placeholder="코드에 대한 간단한 설명">
      </div>
      <div class="form-group" id="quizDiffGroup" style="display:none;">
        <label class="form-label">퀴즈 난이도</label>
        <select class="input-field" id="inputDiff">
          <option value="Easy">쉬움</option>
          <option value="Medium" selected>보통</option>
          <option value="Hard">어려움</option>
          <option value="Expert">전문가</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closePostModal()">취소</button>
      <button class="btn-primary" onclick="submitPost()">게시하기</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal admin-modal">
    <div class="modal-header">
      <div class="modal-title">관리자 로그인</div>
      <button class="modal-close" onclick="closeAdminModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div style="display:flex;gap:8px;">
          <input class="input-field" id="adminPwInput" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkAdmin()">
          <button class="btn-primary" onclick="checkAdmin()" style="white-space:nowrap;">확인</button>
        </div>
      </div>
      <p style="font-size:13px;color:var(--text-muted);">관리자 모드 활성화 시 모든 게시글과 댓글을 삭제할 수 있습니다.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PW = 'commanderid=midday';
let isAdmin = false;
let currentType = 'vuln';

function getData(k) { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } }
function setData(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

function timeAgo(ts) {
  const d = (Date.now() - ts) / 1000;
  if (d < 60) return '방금 전';
  if (d < 3600) return Math.floor(d/60) + '분 전';
  if (d < 86400) return Math.floor(d/3600) + '시간 전';
  return Math.floor(d/86400) + '일 전';
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

function switchPage(p, btn) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  btn.classList.add('active');
}

function openPostModal(type) {
  currentType = type;
  document.getElementById('postModalTitle').textContent =
    type === 'vuln' ? '취약점 분석 게시글 올리기' : '코드 퀴즈 올리기';
  document.getElementById('quizDiffGroup').style.display = type === 'quiz' ? 'flex' : 'none';
  document.getElementById('postModal').classList.add('open');
  document.getElementById('inputAuthor').focus();
}
function closePostModal() {
  document.getElementById('postModal').classList.remove('open');
  ['inputAuthor','inputTitle','inputCode','inputDesc'].forEach(id => document.getElementById(id).value = '');
}

function submitPost() {
  const author = document.getElementById('inputAuthor').value.trim();
  const title  = document.getElementById('inputTitle').value.trim();
  const code   = document.getElementById('inputCode').value.trim();
  const desc   = document.getElementById('inputDesc').value.trim();
  const lang   = document.getElementById('inputLang').value;
  const diff   = document.getElementById('inputDiff').value;

  if (!author) { toast('닉네임을 입력하세요.', 'error'); return; }
  if (!title)  { toast('제목을 입력하세요.', 'error'); return; }
  if (!code)   { toast('코드를 입력하세요.', 'error'); return; }

  const key = currentType === 'vuln' ? 'vulnPosts' : 'quizPosts';
  const posts = getData(key);
  posts.unshift({ id: Date.now(), author, title, code, desc, lang, diff, type: currentType, ts: Date.now(), comments: [] });
  setData(key, posts);
  closePostModal();
  renderPosts(currentType);
  toast('게시글이 등록되었습니다!');
}

function renderPosts(type) {
  const key    = type === 'vuln' ? 'vulnPosts' : 'quizPosts';
  const listEl = document.getElementById(type === 'vuln' ? 'vulnList' : 'quizList');
  const cntEl  = document.getElementById(type === 'vuln' ? 'vulnCount' : 'quizCount');
  const posts  = getData(key);
  cntEl.textContent = posts.length;

  if (!posts.length) {
    listEl.innerHTML = type === 'vuln'
      ? `<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>아직 게시글이 없습니다</h3><p>첫 번째로 코드를 올려 취약점 분석을 요청해보세요.</p></div>`
      : `<div class="empty-state"><div class="empty-state-icon">🧩</div><h3>아직 퀴즈가 없습니다</h3><p>숨겨진 버그가 있는 코드를 올려 다른 사람들에게 도전장을 내보세요.</p></div>`;
    return;
  }
  listEl.innerHTML = posts.map(p => buildCard(p, type)).join('');
}

function buildCard(p, type) {
  const tagClass  = type === 'vuln' ? 'tag-vuln' : 'tag-quiz';
  const tagLabel  = type === 'vuln' ? 'VULN' : 'QUIZ';
  const diffBadge = type === 'quiz'
    ? `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid rgba(188,140,255,0.3);background:rgba(188,140,255,0.1);color:#BC8CFF;">★ ${p.diff||'Medium'}</span>`
    : '';
  const cCount = (p.comments||[]).length;
  const preview = esc(p.code).substring(0, 600);
  const sevOpts = ['CRITICAL','HIGH','MEDIUM','LOW','INFO'].map(s => `<option value="${s}">${s}</option>`).join('');
  const commentsHtml = (p.comments||[]).map((c,ci) => buildComment(c, ci, p.id, type)).join('');

  return `
<div class="post-card" id="post-${p.id}">
  <div class="post-card-header">
    <div class="post-meta">
      <span class="post-tag ${tagClass}">${tagLabel}</span>
      ${diffBadge}
      <span class="post-author">by <strong>${esc(p.author)}</strong></span>
      <span class="post-time">${timeAgo(p.ts)}</span>
    </div>
    ${isAdmin ? `<button class="btn-danger" onclick="deletePost(${p.id},'${type}')">🗑 삭제</button>` : ''}
  </div>
  <div class="post-title" onclick="toggleCode(${p.id})">${esc(p.title)}</div>
  ${p.desc ? `<div class="post-description">${esc(p.desc)}</div>` : ''}
  <div class="post-code-preview">
    <div class="code-bar">
      <span class="code-bar-title">${esc(p.title)}</span>
      <span class="code-lang">${esc(p.lang)}</span>
    </div>
    <div class="code-preview-body" id="codeBody-${p.id}">${preview}<div class="code-fade" id="codeFade-${p.id}"></div></div>
  </div>
  <div class="post-footer">
    <span class="stat-item" onclick="toggleComments(${p.id})" style="font-size:13px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:5px;">
      💬 댓글 <strong style="color:var(--text)">${cCount}</strong>
    </span>
  </div>
  <div class="comments-section" id="comments-${p.id}">
    <div class="comment-list" id="commentList-${p.id}">
      ${commentsHtml || '<p style="font-size:13px;color:var(--text-muted);">아직 댓글이 없습니다.</p>'}
    </div>
    <div class="comment-form">
      <div class="comment-form-row">
        <input class="input-field" id="cAuthor-${p.id}" placeholder="닉네임" style="flex:1;">
        <select class="input-field" id="cSev-${p.id}" style="width:140px;">
          <option value="">심각도 선택</option>${sevOpts}
        </select>
      </div>
      <textarea class="input-field" id="cContent-${p.id}" placeholder="${type==='vuln'?'발견한 취약점을 분석해주세요. 라인 번호, 수정 방안 등을 포함하면 좋습니다.':'버그를 찾으셨나요? 어떤 취약점인지 설명해주세요!'}"></textarea>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-submit-comment" onclick="submitComment(${p.id},'${type}')">댓글 등록</button>
      </div>
    </div>
  </div>
</div>`;
}

function buildComment(c, ci, postId, type) {
  const sevBadge = c.severity
    ? `<span class="severity-badge sev-${c.severity.toLowerCase()}">${c.severity}</span>` : '';
  return `
<div class="comment-item">
  <div class="comment-header">
    <span class="comment-author">${esc(c.author)}</span>
    ${sevBadge}
    <span class="comment-time">${timeAgo(c.ts)}</span>
    ${isAdmin ? `<button class="comment-delete-btn" onclick="deleteComment(${postId},${ci},'${type}')">✕</button>` : ''}
  </div>
  <div class="comment-content">${esc(c.content)}</div>
</div>`;
}

function toggleCode(id) {
  const body = document.getElementById('codeBody-' + id);
  const fade = document.getElementById('codeFade-' + id);
  const expanded = body.classList.toggle('expanded');
  if (fade) fade.style.display = expanded ? 'none' : '';
}

function toggleComments(id) {
  document.getElementById('comments-' + id).classList.toggle('open');
}

function submitComment(postId, type) {
  const author   = document.getElementById('cAuthor-' + postId).value.trim();
  const content  = document.getElementById('cContent-' + postId).value.trim();
  const severity = document.getElementById('cSev-' + postId).value;
  if (!author)  { toast('닉네임을 입력하세요.', 'error'); return; }
  if (!content) { toast('내용을 입력하세요.', 'error'); return; }

  const key = type === 'vuln' ? 'vulnPosts' : 'quizPosts';
  const posts = getData(key);
  const idx = posts.findIndex(p => p.id === postId);
  if (idx === -1) return;
  posts[idx].comments.push({ author, content, severity, ts: Date.now() });
  setData(key, posts);
  renderPosts(type);
  setTimeout(() => document.getElementById('comments-' + postId).classList.add('open'), 30);
  toast('댓글이 등록되었습니다!');
}

function deletePost(postId, type) {
  if (!isAdmin) return;
  const key = type === 'vuln' ? 'vulnPosts' : 'quizPosts';
  setData(key, getData(key).filter(p => p.id !== postId));
  renderPosts(type);
  toast('게시글이 삭제되었습니다.', 'error');
}

function deleteComment(postId, ci, type) {
  if (!isAdmin) return;
  const key = type === 'vuln' ? 'vulnPosts' : 'quizPosts';
  const posts = getData(key);
  const idx = posts.findIndex(p => p.id === postId);
  if (idx === -1) return;
  posts[idx].comments.splice(ci, 1);
  setData(key, posts);
  renderPosts(type);
  toast('댓글이 삭제되었습니다.', 'error');
}

function openAdminModal() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminIndicator').classList.remove('visible');
    renderPosts('vuln'); renderPosts('quiz');
    toast('관리자 모드가 해제되었습니다.', 'error');
    return;
  }
  document.getElementById('adminModal').classList.add('open');
  setTimeout(() => document.getElementById('adminPwInput').focus(), 80);
}
function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('open');
  document.getElementById('adminPwInput').value = '';
}
function checkAdmin() {
  if (document.getElementById('adminPwInput').value.trim() === ADMIN_PW) {
    isAdmin = true;
    document.getElementById('adminIndicator').classList.add('visible');
    closeAdminModal();
    renderPosts('vuln'); renderPosts('quiz');
    toast('관리자 모드가 활성화되었습니다.');
  } else {
    toast('비밀번호가 틀렸습니다.', 'error');
    document.getElementById('adminPwInput').value = '';
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('postModal').addEventListener('click', e => { if (e.target.id==='postModal') closePostModal(); });
document.getElementById('adminModal').addEventListener('click', e => { if (e.target.id==='adminModal') closeAdminModal(); });

renderPosts('vuln');
renderPosts('quiz');
</script>
</body>
</html>
